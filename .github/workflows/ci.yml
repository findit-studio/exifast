name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule: [cron: "0 1 */7 * *"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  # Check formatting (platform-independent, one OS is enough)
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      run: rustup update stable && rustup default stable && rustup component add rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  # Apply clippy lints.
  #
  # Phase C: clippy runs on default + `--all-features` only. Per-feature
  # enumeration (`cargo hack clippy --each-feature`) is deferred to Phase
  # D/E/F when the source migrates off unconditional `std::*` usage; see
  # `docs/tracking.md` "Decisions deferred during overnight execution".
  #
  # Phase C also overrides the workflow-level `RUSTFLAGS: -Dwarnings` for
  # this job: Rust 1.95.0 + edition 2024 raise stricter clippy lints
  # (`manual_repeat_n`, `manual_map_or`, `collapsible_if`, `useless_vec`)
  # on existing source code that pre-dates these lints. Applying them is
  # a beyond-scope mechanical sweep tracked as FU-15 (Phase C clippy sweep).
  # For Phase C the gate ensures clippy COMPILES; warnings are inspected,
  # not enforced.
  clippy:
    name: clippy
    env:
      RUSTFLAGS: ""
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
    - name: Clippy (default features)
      run: cargo clippy --all-targets
    - name: Clippy (--all-features)
      run: cargo clippy --all-features --all-targets

  # Run tests on some extra platforms
  cross:
    name: cross
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
          - aarch64-unknown-linux-musl
          - i686-linux-android
          - x86_64-linux-android
          - i686-pc-windows-gnu
          - x86_64-pc-windows-gnu
          - i686-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - wasm32-unknown-unknown
          - wasm32-unknown-emscripten
          - wasm32-wasip1
          - wasm32-wasip1-threads
          - wasm32-wasip2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cross-
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: cargo build --target ${{ matrix.target }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --target ${{ matrix.target }}

  build:
    name: build
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Cache cargo build and registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-build-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Build (default features)
      run: cargo build
    - name: Build (--all-features)
      run: cargo build --all-features

  test:
    name: test
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Cache cargo build and registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-test-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Test (default features)
      run: cargo test --all-targets
    - name: Test (--all-features)
      run: cargo test --all-features --all-targets

  # lib-first migration spec §9 matrix.
  # The default tier (`--all-features`) is required-to-pass. The other tiers
  # are added with `continue-on-error: true` for Phase C — they exist so
  # progress is visible per Phase D/E/F without blocking each phase's merge.
  # Source code still uses `std::vec::Vec`, `std::string::String`, etc.
  # unconditionally (current push-style Metadata API); WASM and alloc-only
  # tiers compile-fail until Phase E/F migrate Meta types to `&'a str`
  # storage. See `docs/superpowers/specs/2026-05-21-lib-first-formatparser-design.md`
  # §9 and `docs/tracking.md` "Decisions deferred during overnight execution".
  lib-first-matrix:
    name: lib-first / ${{ matrix.tier.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tier:
          # Required-to-pass tiers.
          - name: "std + json + all-formats (default)"
            flags: "--all-features"
            target: ""
            required: true
          # Below: continue-on-error until Phase E/F retire the temporary
          # std/alloc coupling in the source.
          - name: "alloc only, all formats"
            flags: "--no-default-features --features alloc,all-formats"
            target: ""
            required: false
          - name: "wasm32-unknown-unknown (alloc)"
            flags: "--no-default-features --features alloc,all-formats"
            target: "wasm32-unknown-unknown"
            required: false
          - name: "wasm32-wasip1 (std)"
            flags: "--features std,all-formats"
            target: "wasm32-wasip1"
            required: false
          - name: "alloc + only ogg"
            flags: "--no-default-features --features alloc,ogg"
            target: ""
            required: false
          - name: "alloc + only moi"
            flags: "--no-default-features --features alloc,moi"
            target: ""
            required: false
          - name: "no_std + moi (no-alloc baseline)"
            flags: "--no-default-features --features moi"
            target: ""
            required: false
    continue-on-error: ${{ !matrix.tier.required }}
    steps:
    - uses: actions/checkout@v6
    - name: Install Rust
      run: rustup update stable && rustup default stable
    - name: Add target
      if: ${{ matrix.tier.target != '' }}
      run: rustup target add ${{ matrix.tier.target }}
    - name: Cache cargo build and registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-libfirst-${{ matrix.tier.name }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-libfirst-
    - name: Build
      run: |
        if [ -n "${{ matrix.tier.target }}" ]; then
          cargo build --target ${{ matrix.tier.target }} ${{ matrix.tier.flags }}
        else
          cargo build ${{ matrix.tier.flags }}
        fi
    - name: Test
      # WASM/cross targets can build but not run on the host; skip the test
      # step for those tiers (build-only verification).
      if: ${{ matrix.tier.target == '' }}
      run: cargo test ${{ matrix.tier.flags }}

  sanitizer:
    name: sanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-sanitizer-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sanitizer-
      - name: Install Rust
        run: rustup update nightly && rustup default nightly
      - name: Install rust-src
        run: rustup component add rust-src
      - name: ASAN / LSAN / MSAN / TSAN
        run: bash ci/sanitizer.sh

  miri-tb:
    name: miri-tb-${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: powerpc64-unknown-linux-gnu
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-
      - name: Miri
        run: |
          bash ci/miri_tb.sh "${{ matrix.target }}"

  miri-sb:
    name: miri-sb-${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: powerpc64-unknown-linux-gnu
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-
      - name: Miri
        run: |
          bash ci/miri_sb.sh "${{ matrix.target }}"

  # valgrind:
  #   name: valgrind
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Cache cargo build and registry
  #       uses: actions/cache@v5
  #       with:
  #         path: |
  #           ~/.cargo/registry
  #           ~/.cargo/git
  #           target
  #         key: ubuntu-latest-valgrind-${{ hashFiles('**/Cargo.lock') }}
  #         restore-keys: |
  #           ubuntu-latest-valgrind-
  #     - name: Install Rust
  #       run: rustup update stable && rustup default stable
  #     - name: Install Valgrind
  #       run: |
  #         sudo apt-get update -y
  #         sudo apt-get install -y valgrind
  #     # Uncomment and customize when you have binaries to test:
  #     # - name: cargo build foo
  #     #   run: cargo build --bin foo
  #     #   working-directory: integration
  #     # - name: Run valgrind foo
  #     #   run: valgrind --error-exitcode=1 --leak-check=full --show-leak-kinds=all ./target/debug/foo
  #     #   working-directory: integration

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs:
      - rustfmt
      - clippy
      - build
      - cross
      - test
      - sanitizer
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: rustup update nightly && rustup default nightly
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Cache cargo build and registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-
      - name: Run tarpaulin
        env:
          RUSTFLAGS: "--cfg tarpaulin"
        run: cargo tarpaulin --all-features --run-types tests --run-types doctests --workspace --out xml
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ${{ github.repository }}
          fail_ci_if_error: true
